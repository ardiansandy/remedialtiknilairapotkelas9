        .container { max-width: 850px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        header { text-align: center; border-bottom: 2px solid var(--secondary); margin-bottom: 30px; padding-bottom: 10px; }
        .step { display: none; }
        .step.active { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .form-group { margin-bottom: 20px; position: relative; }
        label { display: block; margin-bottom: 8px; font-weight: 600; }
        input, select { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .suggestions { position: absolute; background: white; border: 1px solid #ddd; width: 100%; z-index: 100; max-height: 200px; overflow-y: auto; border-radius: 0 0 8px 8px; }
        .suggestions div { padding: 10px; cursor: pointer; }
        .suggestions div:hover { background: var(--secondary); }
        .section-divider { background: #f8f9fa; padding: 10px 15px; border-left: 5px solid var(--primary); margin: 25px 0 15px 0; font-weight: bold; color: var(--primary); text-transform: uppercase; }
        .question-card { background: white; padding: 15px; border: 1px solid #eee; border-radius: 10px; margin-bottom: 12px; }
        .btn { background: var(--primary); color: white; padding: 15px 25px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; width: 100%; font-weight: bold; margin-top: 20px; }
        .btn:disabled { background: #ccc; }
        .result-box { text-align: center; padding: 30px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Portal Remedial TIK</h1>
        <p>Silahkan isi data diri dan kerjakan soal menjodohkan.</p>
    </header>

    <div id="step1" class="step active">
        <div class="form-group">
            <label>Cari Nama Anda:</label>
            <input type="text" id="nameInput" placeholder="Ketik nama..." autocomplete="off">
            <div id="nameSuggestions" class="suggestions"></div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="form-group">
                <label>Kelas:</label>
                <select id="classSelect">
                    <option value="9A">9A</option>
                    <option value="9B">9B</option>
                    <option value="9C">9C</option>
                    <option value="9D">9D</option>
                </select>
            </div>
            <div class="form-group">
                <label>Pilih Semester:</label>
                <select id="semesterSelect">
                    <option value="1">Semester 1</option>
                    <option value="2">Semester 2</option>
                    <option value="3">Semester 3</option>
                    <option value="4">Semester 4</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>Nilai Rapot Sebelumnya:</label>
            <input type="number" id="prevGrade" placeholder="Contoh: 65">
        </div>

        <button class="btn" onclick="startQuiz()">Lanjut ke Soal</button>
    </div>

    <div id="step2" class="step">
        <div id="quizContainer"></div>
        <button class="btn" id="submitBtn" onclick="finishQuiz()">Kirim Jawaban Ke Ustadz</button>
    </div>

    <div id="step3" class="step">
        <div class="result-box">
            <h2 id="statusTitle">Mengirim Data...</h2>
            <div id="scoreBox" style="display:none">
                <p id="summaryText"></p>
                <div style="font-size: 60px; font-weight: 800; color: var(--primary);" id="scoreDisplay">0</div>
                <p>Silahkan ulangi lagi jika nilai belum mencapai 85</p>
                <p>Data otomatis tersimpan di Google Sheet Ustd Ardi</p>
                <button class="btn" onclick="location.reload()">Selesai</button>
            </div>
        </div>
    </div>
</div>

        { q: "Alat input untuk memasukkan suara ke komputer adalah ...", a: "Microphone" },
        { q: "Alat output untuk menampilkan presentasi ke dinding adalah ...", a: "Proyektor" },
        { q: "Papan sirkuit utama tempat semua komponen terpasang disebut ...", a: "Motherboard" },
        { q: "Kipas di atas CPU yang berfungsi mendinginkan suhu disebut ...", a: "Heatsink" },
        { q: "Bagian komputer yang menyuplai listrik ke semua komponen adalah ...", a: "Power Supply" },
        { q: "Tombol pada keyboard untuk membuat huruf kapital semua adalah ...", a: "Caps Lock" },
        { q: "Tombol pada keyboard untuk berpindah baris baru adalah ...", a: "Enter" },
        { q: "Tombol pada keyboard untuk membatalkan perintah/keluar adalah ...", a: "Esc" },
        { q: "Kamera kecil pada laptop untuk video call disebut ...", a: "Webcam" },
        { q: "Satuan terkecil data dalam komputer disebut ...", a: "Bit" },
        { q: "Kumpulan dari 8 bit data disebut ...", a: "Byte" },
        { q: "Singkatan dari Random Access Memory adalah ...", a: "RAM" },
        { q: "Istilah untuk menghidupkan kembali komputer (mulai dari awal) adalah ...", a: "Restart" },
        { q: "Program kecil yang merusak sistem komputer disebut ...", a: "Virus" },
        { q: "Mengatur file ke dalam folder-folder agar rapi disebut ...", a: "Manajemen File" },
        { q: "Mengompres file besar menjadi lebih kecil biasanya berekstensi ...", a: ".zip / .rar" },
        { q: "Alat untuk menstabilkan tegangan listrik komputer adalah ...", a: "Stabilizer" },
        { q: "Baterai cadangan yang menjaga komputer tetap nyala saat mati lampu adalah ...", a: "UPS" }
    ]
};

// Autocomplete Logic
const nameInput = document.getElementById('nameInput');
const suggestionsBox = document.getElementById('nameSuggestions');
nameInput.addEventListener('input', () => {
    const val = nameInput.value.toLowerCase();
    suggestionsBox.innerHTML = '';
    if (val.length < 2) return;
    studentNames.filter(n => n.toLowerCase().includes(val)).forEach(name => {
        const div = document.createElement('div');
        div.innerText = name;
        div.onclick = () => { nameInput.value = name; suggestionsBox.innerHTML = ''; };
        suggestionsBox.appendChild(div);
    });
});

function startQuiz() {
    if (!nameInput.value || !document.getElementById('prevGrade').value) {
        alert("Lengkapi data!"); return;
    }
    document.getElementById('step1').classList.remove('active');
    document.getElementById('step2').classList.add('active');
    renderQuiz();
    window.scrollTo(0,0);
}

function renderQuiz() {
    const sem = document.getElementById('semesterSelect').value;
    const data = allQuizData[sem];
    const container = document.getElementById('quizContainer');
    container.innerHTML = '';

    for (let i = 0; i < 4; i++) {
        const start = i * 10; const end = start + 10;
        const div = document.createElement('div');
        div.className = 'section-divider';
        div.innerText = `BAGIAN ${i+1} (SOAL ${start+1}-${end})`;
        container.appendChild(div);

        const groupAns = [...new Set(data.slice(start, end).map(d => d.a))].sort();

        for (let j = start; j < end; j++) {
            const card = document.createElement('div');
            card.className = 'question-card';
            let opts = `<option value="">-- Pilih Jawaban --</option>`;
            groupAns.forEach(a => opts += `<option value="${a}">${a}</option>`);
            card.innerHTML = `<p>${j+1}. ${data[j].q}</p><select class="ans" data-idx="${j}">${opts}</select>`;
            container.appendChild(card);
        }
    }
}

function finishQuiz() {
    const sem = document.getElementById('semesterSelect').value;
    const data = allQuizData[sem];
    const selects = document.querySelectorAll('.ans');
    let correct = 0;
    selects.forEach(s => { if(s.value === data[s.getAttribute('data-idx')].a) correct++; });
    
    const finalScore = Math.round((correct / 40) * 100);
    
    // Kirim Data
    document.getElementById('step2').classList.remove('active');
    document.getElementById('step3').classList.add('active');
    
    const payload = {
        nama: nameInput.value,
        kelas: document.getElementById('classSelect').value,
        semester: sem,
        rapot: document.getElementById('prevGrade').value,
        hasil: finalScore
    };

    fetch(SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
    }).then(() => {
        document.getElementById('statusTitle').innerText = "Berhasil Dikirim!";
        document.getElementById('scoreBox').style.display = "block";
        document.getElementById('summaryText').innerText = `Halo ${payload.nama}, nilai perbaikan kamu:`;
        document.getElementById('scoreDisplay').innerText = finalScore;
    }).catch(err => alert("Gagal mengirim ke Google Sheet. Periksa koneksi!"));
}
</script>
